name: WorkTrace
options:
  bundleIdPrefix: com.worktrace
  deploymentTarget:
    macOS: "26.5"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  WorkTraceKit:
    path: WorkTraceKit

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  WorkTrace:
    type: application
    platform: macOS
    deploymentTarget: "26.5"
    sources:
      - path: App
    dependencies:
      - package: WorkTraceKit
        product: WTCore
      - package: WorkTraceKit
        product: WTStorage
      - package: WorkTraceKit
        product: WTObservation
      - package: WorkTraceKit
        product: WTNormalization
      - package: WorkTraceKit
        product: WTSession
      - package: WorkTraceKit
        product: WTReporting
      - package: WorkTraceKit
        product: WTAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worktrace.app
        PRODUCT_NAME: WorkTrace
        INFOPLIST_FILE: App/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/WorkTrace.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
