name: Feature request
description: Propose a focused improvement to WorkTrace
title: "[Feature]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        WorkTrace is local-first and privacy-sensitive. Please explain the user problem before proposing an implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and data impact
      description: What data would be read, stored, transformed, exported, or transmitted?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for similar proposals.
          required: true
        - label: The proposal does not require hidden telemetry, screenshot capture, or keystroke logging.
          required: true
