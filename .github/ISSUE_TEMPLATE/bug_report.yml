name: Bug report
description: Report a reproducible problem in WorkTrace
title: "[Bug]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include private activity logs, window titles, database files, credentials, or other sensitive data.
  - type: input
    id: version
    attributes:
      label: WorkTrace version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 26.5
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch WorkTrace
        2. Open ...
        3. Select ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Safe diagnostic information
      description: Paste only sanitized logs. Remove usernames, paths, window titles, activity data, and identifiers.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed private activity data and sensitive information.
          required: true
        - label: This is not a security vulnerability requiring private disclosure.
          required: true
